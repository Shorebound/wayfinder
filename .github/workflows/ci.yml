name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format Check ────────────────────────────────────────────────
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          . /etc/lsb-release
          echo "deb http://apt.llvm.org/${DISTRIB_CODENAME}/ llvm-toolchain-${DISTRIB_CODENAME}-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-format-20
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-20 100

      - name: Run clang-format (dry run)
        run: |
          find engine/ sandbox/ tests/ tools/ \
            \( -name '*.cpp' -o -name '*.h' \) \
            -not -path '*/thirdparty/*' \
            -not -path '*/_deps/*' \
            -not -path '*/shadercompiler/*' \
            -not -path '*/shadercompiler/*' \
            -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: Run format-fixup check
        run: |
          find engine/ sandbox/ tests/ tools/ \
            \( -name '*.cpp' -o -name '*.h' \) \
            -not -path '*/thirdparty/*' \
            -not -path '*/_deps/*' \
            -not -path '*/shadercompiler/*' \
            -not -path '*/shadercompiler/*' \
            -print0 \
            | xargs -0 python3 tools/format-fixup.py --check

  # ── Build & Test (Linux / Clang) ───────────────────────────────
  build-test-linux:
    name: Linux (Clang)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: thirdparty
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/WayfinderDependencies.cmake') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Setup build environment
        uses: ./.github/actions/setup-linux-build

      - name: Configure
        run: cmake --preset ci-linux

      - name: Build
        run: cmake --build --preset ci-linux-debug

      - name: Test
        run: ctest --preset ci-linux-test --output-on-failure

  # ── Build & Test (Windows / MSVC) ──────────────────────────────
  build-test-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake 4.0.1
        uses: lukka/get-cmake@v4.3.0
        with:
          cmakeVersion: '4.0.1'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: thirdparty
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/WayfinderDependencies.cmake') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Cache DXC shader compiler
        id: cache-dxc
        uses: actions/cache@v4
        with:
          path: tools/shadercompiler/bin
          key: dxc-windows-x64-v1.9.2602

      - name: Download DXC shader compiler
        if: steps.cache-dxc.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Pin to v1.9.2602 — matches local dev setup. Update tag + cache key together.
          $tag = "v1.9.2602"
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/tags/$tag" `
            -Headers @{ "Accept" = "application/vnd.github+json"; "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
          $asset = $release.assets | Where-Object { $_.name -like "dxc_*.zip" } | Select-Object -First 1
          if (-not $asset) { throw "No dxc_*.zip asset found in DXC release $tag" }
          Write-Host "Downloading $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "dxc.zip"
          Expand-Archive "dxc.zip" -DestinationPath "dxc-staging"
          # Copy only the x64 binaries into the project's expected location
          $x64Bin = Join-Path "dxc-staging" "bin" "x64"
          if (-not (Test-Path "$x64Bin\dxc.exe")) { throw "bin/x64/dxc.exe not found in DXC archive" }
          New-Item -ItemType Directory -Path "tools/shadercompiler/bin/x64" -Force | Out-Null
          Copy-Item "$x64Bin\*" "tools/shadercompiler/bin/x64/" -Recurse
          Write-Host "DXC installed to tools/shadercompiler/bin/x64/"

      - name: Configure
        run: cmake --preset ci-windows "-DDXC_EXECUTABLE=$env:DXC_SPIRV_PATH"

      - name: Build
        run: cmake --build --preset ci-windows-debug

      - name: Test
        run: ctest --preset ci-windows-test --output-on-failure

  # ── Static Analysis (clang-tidy) ───────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: thirdparty
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/WayfinderDependencies.cmake') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Setup build environment
        uses: ./.github/actions/setup-linux-build

      - name: Configure (for compile_commands.json)
        run: cmake --preset ci-linux

      # Phase A: Only analyse files changed in this PR / push.
      # Switch to full-source scan once baseline is clean.
      - name: Get changed C++ files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            # Force-pushes set before to the null SHA.
            if [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="origin/${{ github.event.repository.default_branch }}"
            fi
          fi

          files=$(git diff --name-only "$base"..HEAD -- '*.cpp' '*.h' \
            | grep -E '^(engine|sandbox|tests|tools)/' \
            | grep -v 'thirdparty/' \
            || true)

          if [ -z "$files" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No C++ files changed — skipping clang-tidy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "$files" > /tmp/changed_files.txt
            echo "Changed files:"
            cat /tmp/changed_files.txt
          fi

      - name: Run clang-tidy on changed files
        if: steps.changed.outputs.skip != 'true'
        shell: bash
        run: |
          set -o pipefail
          cat /tmp/changed_files.txt \
            | xargs clang-tidy -p build --warnings-as-errors='' 2>&1 \
            | tee /tmp/clang-tidy-output.txt

          # For now, report but don't fail. Uncomment to enforce:
          # if grep -q 'warning:' /tmp/clang-tidy-output.txt; then
          #   echo "::error::clang-tidy reported warnings on changed files"
          #   exit 1
          # fi
