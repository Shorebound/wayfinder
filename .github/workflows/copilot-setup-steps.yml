name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Publish a reusable runner snapshot after setup succeeds.
    snapshot: "wayfinder-copilot-linux"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CMake 4.0.1+ is required — the runner's default CMake is too old.
      - name: Install CMake 4.0.1
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.0.1"

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      # Clang + libc++ for C++23 std::expected support.
      # SDL3 system deps: X11, audio, Wayland, Mesa, udev, dbus.
      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            clang lld libc++-dev libc++abi-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libdbus-1-dev libudev-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
            libdecor-0-dev libwayland-dev

      - name: Configure (ci-linux preset)
        run: cmake --preset ci-linux

      - name: Build (Debug)
        run: cmake --build --preset ci-linux-debug
