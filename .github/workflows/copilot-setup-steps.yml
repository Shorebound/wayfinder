name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Publish a reusable runner snapshot after setup succeeds.
    # snapshot: "wayfinder-copilot-linux"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-linux-build

      - name: Configure (ci-linux preset)
        run: cmake --preset ci-linux

      - name: Build (Debug)
        run: cmake --build --preset ci-linux-debug
