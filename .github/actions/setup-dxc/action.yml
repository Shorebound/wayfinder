name: 'Setup DXC Shader Compiler'
description: 'Download and cache the DirectX Shader Compiler (SPIRV-capable) for shader compilation'

inputs:
  version:
    description: 'DXC release tag (e.g. v1.9.2602). Must match a GitHub release of microsoft/DirectXShaderCompiler.'
    required: false
    default: 'v1.9.2602'
  token:
    description: 'GitHub token for API access'
    required: true

runs:
  using: composite
  steps:
    - name: Cache DXC
      id: cache-dxc
      uses: actions/cache@v4
      with:
        path: |
          tools/shadercompiler/bin
          tools/shadercompiler/lib
        key: dxc-${{ runner.os }}-x64-${{ inputs.version }}

    - name: Download DXC (Linux)
      if: steps.cache-dxc.outputs.cache-hit != 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        asset_url=$(curl -s \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          "https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/tags/${{ inputs.version }}" \
          | jq -r '.assets[] | select(.name | test("^linux_dxc_.*x86_64\\.tar\\.gz$")) | .browser_download_url')
        if [ -z "$asset_url" ]; then echo "::error::No linux DXC asset in ${{ inputs.version }}" && exit 1; fi
        echo "Downloading DXC ${{ inputs.version }} for Linux"
        curl -sL "$asset_url" -o dxc.tar.gz
        mkdir -p dxc-staging
        tar -xzf dxc.tar.gz -C dxc-staging
        if [ ! -f dxc-staging/bin/dxc ]; then echo "::error::bin/dxc not found in archive" && exit 1; fi
        mkdir -p tools/shadercompiler/bin tools/shadercompiler/lib
        cp dxc-staging/bin/dxc tools/shadercompiler/bin/
        cp dxc-staging/lib/*.so* tools/shadercompiler/lib/ 2>/dev/null || true
        chmod +x tools/shadercompiler/bin/dxc
        rm -rf dxc-staging dxc.tar.gz

    - name: Download DXC (Windows)
      if: steps.cache-dxc.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: pwsh
      run: |
        $release = Invoke-RestMethod `
          -Uri "https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/tags/${{ inputs.version }}" `
          -Headers @{ "Accept" = "application/vnd.github+json"; "Authorization" = "Bearer ${{ inputs.token }}" }
        # DXC ships one unified Windows zip (dxc_YYYY_MM_DD.zip) containing bin/x64/ and bin/arm64/;
        # the x64 binary is selected during extraction below.
        $asset = $release.assets | Where-Object { $_.name -like "dxc_*.zip" } | Select-Object -First 1
        if (-not $asset) { throw "No dxc_*.zip asset in DXC release ${{ inputs.version }}" }
        Write-Host "Downloading DXC ${{ inputs.version }} for Windows"
        Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "dxc.zip"
        Expand-Archive "dxc.zip" -DestinationPath "dxc-staging"
        $x64Bin = Join-Path "dxc-staging" "bin" "x64"
        if (-not (Test-Path "$x64Bin\dxc.exe")) { throw "bin/x64/dxc.exe not found in archive" }
        New-Item -ItemType Directory -Path "tools/shadercompiler/bin/x64" -Force | Out-Null
        Copy-Item "$x64Bin\*" "tools/shadercompiler/bin/x64/" -Recurse
        Remove-Item "dxc-staging", "dxc.zip" -Recurse -Force

    - name: Set DXC library path (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        lib_dir="$GITHUB_WORKSPACE/tools/shadercompiler/lib"
        echo "LD_LIBRARY_PATH=${lib_dir}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

    - name: Verify DXC
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          dxc="tools/shadercompiler/bin/x64/dxc.exe"
        else
          dxc="tools/shadercompiler/bin/dxc"
        fi
        if [ ! -f "$dxc" ]; then echo "::error::DXC not found at $dxc" && exit 1; fi
        echo "DXC ready at $dxc"
        "$dxc" --help > /dev/null 2>&1
