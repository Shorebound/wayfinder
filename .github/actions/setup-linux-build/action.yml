name: 'Setup Linux Build Environment'
description: 'Install CMake, Ninja, Clang, libc++, and SDL3 system dependencies for Linux CI'

runs:
  using: composite
  steps:
    - name: Install CMake 4.0.1
      uses: lukka/get-cmake@v4.3.0
      with:
        cmakeVersion: '4.0.1'

    - name: Add LLVM 22 repository
      shell: bash
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
        . /etc/lsb-release
        echo "deb http://apt.llvm.org/${DISTRIB_CODENAME}/ llvm-toolchain-${DISTRIB_CODENAME}-22 main" \
          | sudo tee /etc/apt/sources.list.d/llvm-22.list

    - name: Install system dependencies
      shell: bash
      run: |
        # Remove pre-installed Microsoft repos that intermittently 403 on GitHub runners
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ninja-build \
          clang-22 lld-22 libc++-22-dev libc++abi-22-dev \
          clang-tidy-22 clang-format-22 \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
          libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
          libasound2-dev libpulse-dev libpipewire-0.3-dev \
          libdbus-1-dev libudev-dev \
          libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
          libdecor-0-dev libwayland-dev
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 100
        sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-22 100
        sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-22 100
        sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-22 100
        sudo update-alternatives --set clang /usr/bin/clang-22
        sudo update-alternatives --set clang++ /usr/bin/clang++-22
        sudo update-alternatives --set clang-tidy /usr/bin/clang-tidy-22
        sudo update-alternatives --set clang-format /usr/bin/clang-format-22
        sudo update-alternatives --set lld /usr/bin/lld-22

    - name: Verify LLVM 22 toolchain
      shell: bash
      run: |
        EXPECTED_MAJOR=22
        echo "── Resolved tool paths ──"
        echo "clang:        $(readlink -f "$(command -v clang)")"
        echo "clang++:      $(readlink -f "$(command -v clang++)")"
        echo "clang-tidy:   $(readlink -f "$(command -v clang-tidy)")"
        echo "clang-format:  $(readlink -f "$(command -v clang-format)")"
        echo "lld:          $(readlink -f "$(command -v lld)")"
        echo ""
        ACTUAL=$(clang++ --version | head -1 | grep -oP '\d+' | head -1)
        echo "Expected Clang major version: $EXPECTED_MAJOR"
        echo "Actual Clang major version:   $ACTUAL"
        if [ "$ACTUAL" != "$EXPECTED_MAJOR" ]; then
          echo "::error::Expected clang++ $EXPECTED_MAJOR but got $ACTUAL. Check update-alternatives setup."
          exit 1
        fi
        echo "Toolchain OK."
