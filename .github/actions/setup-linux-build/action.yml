name: 'Setup Linux Build Environment'
description: 'Install CMake, Ninja, Clang, libc++, and SDL3 system dependencies for Linux CI'

runs:
  using: composite
  steps:
    - name: Install CMake 4.0.1
      uses: lukka/get-cmake@v4.3.0
      with:
        cmakeVersion: '4.0.1'

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ninja-build \
          clang-18 lld-18 libc++-18-dev libc++abi-18-dev \
          clang-tidy-18 clang-format-18 \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
          libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
          libasound2-dev libpulse-dev libpipewire-0.3-dev \
          libdbus-1-dev libudev-dev \
          libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
          libdecor-0-dev libwayland-dev
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
        sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100
        sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100
        sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-18 100
